<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>剧本杀售后 · 沉浸展示</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --panel: rgba(18, 16, 24, 0.92);
      --border: rgba(180, 150, 100, 0.25);
      --gold: #c9a962;
      --gold-dim: #8a7344;
      --text: #e8e4dc;
      --text-muted: #9a958a;
      --accent: #6b2d3c;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Serif SC", "ZCOOL XiaoWei", serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== 编辑面板 ===== */
    .editor {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      max-width: 100vw;
      height: 100vh;
      background: var(--panel);
      border-left: 1px solid var(--border);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s ease;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.4);
    }

    .editor.collapsed {
      transform: translateX(100%);
    }

    .editor-toggle {
      position: fixed;
      top: 50%;
      right: 380px;
      transform: translateY(-50%);
      z-index: 101;
      background: var(--panel);
      border: 1px solid var(--border);
      border-right: none;
      color: var(--gold);
      padding: 12px 8px;
      cursor: pointer;
      border-radius: 8px 0 0 8px;
      font-size: 14px;
      writing-mode: vertical-rl;
      letter-spacing: 2px;
      transition: right 0.35s ease;
    }

    .editor.collapsed + .editor-toggle {
      right: 0;
    }

    .editor-header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--border);
    }

    .editor-header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.15em;
    }

    .editor-header p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .editor-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 24px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      color: var(--gold-dim);
      margin-bottom: 8px;
      letter-spacing: 0.08em;
    }

    .field input[type="text"],
    .field textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--gold);
    }

    .field textarea {
      min-height: 180px;
      line-height: 1.7;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .toggle-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--gold);
    }

    .toggle-row .toggle-title {
      font-size: 0.85rem;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .toggle-row .toggle-desc {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
      line-height: 1.4;
    }

    .upload-zone {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover {
      border-color: var(--gold);
      background: rgba(201, 169, 98, 0.05);
    }

    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-zone .hint {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .upload-preview {
      margin-top: 10px;
      max-height: 80px;
      border-radius: 4px;
      object-fit: cover;
      width: 100%;
      display: none;
    }

    .upload-preview.visible {
      display: block;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 120px;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    .btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #3d1a24);
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #7a3545, #4a2230);
      color: #f0d9a0;
    }

    .btn-share {
      width: 100%;
      flex: none;
      padding: 14px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      background: linear-gradient(135deg, #2d5a3d, #1a3d28);
      border-color: #6ab87a;
      color: #b8e6c1;
      letter-spacing: 0.12em;
    }

    .btn-share:hover {
      background: linear-gradient(135deg, #3a7050, #245a38);
      color: #d4f5dc;
      border-color: #8ed4a0;
    }

    .btn-share:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .music-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 8px;
      min-height: 1.2em;
    }

    .music-status.playing {
      color: var(--gold);
    }

    .share-box {
      margin-top: 16px;
      padding: 14px;
      background: rgba(45, 90, 61, 0.15);
      border: 1px solid rgba(106, 184, 122, 0.35);
      border-radius: 6px;
    }

    .share-box label {
      font-size: 0.75rem;
      color: var(--gold-dim);
      display: block;
      margin-bottom: 6px;
    }

    .share-url {
      width: 100%;
      font-size: 0.7rem;
      padding: 8px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      word-break: break-all;
      margin-bottom: 8px;
    }

    .share-hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-top: 8px;
    }

    body.view-mode .editor,
    body.view-mode .editor-toggle {
      display: none;
    }

    body.view-mode .stage {
      padding: 60px 40px;
    }

    .autoplay-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      background: rgba(12, 10, 18, 0.9);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 0.85rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      display: none;
      animation: pulse 2s infinite;
    }

    .autoplay-hint.visible {
      display: block;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* ===== 分享弹窗 ===== */
    .share-modal {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(5, 4, 8, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(6px);
    }

    .share-modal.open {
      display: flex;
    }

    .share-modal-content {
      width: 100%;
      max-width: 480px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .share-modal-content h3 {
      color: var(--gold);
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 0.15em;
    }

    .share-modal-url {
      width: 100%;
      font-size: 0.8rem;
      padding: 12px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      word-break: break-all;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .share-modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .share-modal-actions .btn {
      flex: 1;
      min-width: 100px;
    }

    .qr-wrap {
      text-align: center;
      margin-bottom: 16px;
    }

    .qr-wrap img {
      width: 180px;
      height: 180px;
      border: 4px solid #fff;
      border-radius: 8px;
    }

    .qr-wrap p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .share-modal-close {
      width: 100%;
      margin-top: 8px;
    }

    /* ===== 展示区域 ===== */
    .stage {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 420px 60px 60px;
      transition: padding 0.35s ease;
    }

    .editor.collapsed ~ .stage {
      padding-right: 60px;
    }

    .stage-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(107, 45, 60, 0.15), transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(201, 169, 98, 0.08), transparent 45%),
        linear-gradient(180deg, #0d0b12 0%, #15121a 50%, #0a090e 100%);
      background-size: cover;
      background-position: center;
      transition: background-image 0.6s ease;
    }

    .stage-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(8, 6, 12, 0.55);
      pointer-events: none;
    }

    .stage-bg.has-image::after {
      background: rgba(8, 6, 12, 0.62);
    }

    .content-card {
      position: relative;
      z-index: 1;
      max-width: 720px;
      width: 100%;
      background: rgba(12, 10, 18, 0.75);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 52px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .content-card::before,
    .content-card::after {
      content: "◆";
      position: absolute;
      color: var(--gold-dim);
      font-size: 0.6rem;
      opacity: 0.6;
    }

    .content-card::before {
      top: 16px;
      left: 20px;
    }

    .content-card::after {
      bottom: 16px;
      right: 20px;
    }

    .content-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.2em;
    }

    .content-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 32px;
    }

    .content-body {
      font-size: 1.05rem;
      line-height: 2;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      text-align: justify;
    }

    .content-body:empty::before {
      content: "在此输入剧本杀售后内容，点击「应用预览」即可在此展示…";
      color: var(--text-muted);
      font-style: italic;
    }

    /* ===== 启动遮罩 ===== */
    .start-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(5, 4, 8, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease, visibility 0.6s;
    }

    .start-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-overlay h2 {
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: 0.3em;
      font-weight: 400;
    }

    .start-overlay p {
      color: var(--text-muted);
      font-size: 0.9rem;
      max-width: 360px;
      text-align: center;
      line-height: 1.6;
    }

    .start-btn {
      padding: 14px 48px;
      font-size: 1rem;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, var(--accent), #3d1a24);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .start-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 24px rgba(201, 169, 98, 0.2);
    }

    /* ===== 音乐控制 ===== */
    .music-control {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(12, 10, 18, 0.8);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 16px 8px 10px;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .music-control.visible {
      opacity: 1;
    }

    .music-control button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .music-control button:hover {
      background: rgba(201, 169, 98, 0.1);
    }

    .music-control span {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    #yt-player {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 300px;
      height: 200px;
      opacity: 0.01;
      pointer-events: none;
      z-index: -1;
    }

    body.view-mode .music-control.visible {
      opacity: 1;
      z-index: 60;
    }

    @media (max-width: 900px) {
      .editor {
        width: 100%;
        height: auto;
        max-height: 50vh;
        border-left: none;
        border-bottom: 1px solid var(--border);
      }

      .editor-toggle {
        top: auto;
        bottom: 0;
        right: 50%;
        transform: translateX(50%);
        writing-mode: horizontal-tb;
        border-radius: 8px 8px 0 0;
        border: 1px solid var(--border);
        border-bottom: none;
        padding: 8px 16px;
      }

      .editor.collapsed + .editor-toggle {
        right: 50%;
        bottom: 0;
      }

      .stage {
        padding: 40px 20px;
        padding-top: calc(50vh + 20px);
      }

      .editor.collapsed ~ .stage {
        padding-top: 40px;
      }

      .content-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <!-- 自动播放失败时的轻提示 -->
  <div class="autoplay-hint" id="autoplayHint">点击任意处播放背景音乐</div>

  <div class="share-modal" id="shareModal">
    <div class="share-modal-content">
      <h3>分享链接</h3>
      <textarea class="share-modal-url" id="shareUrlModal" rows="4" readonly></textarea>
      <div class="share-modal-actions">
        <button class="btn btn-primary" id="copyShareModal" type="button">复制链接</button>
        <button class="btn btn-primary" id="nativeShareBtn" type="button">发送分享</button>
      </div>
      <div class="qr-wrap" id="qrWrap">
        <img id="qrImage" alt="分享二维码" />
        <p>微信扫码打开</p>
      </div>
      <p class="share-hint" id="shareModalHint">将此链接发给玩家，打开后会自动展示内容并播放音乐</p>
      <button class="btn share-modal-close" id="closeShareModal" type="button">关闭</button>
    </div>
  </div>

  <!-- 编辑面板 -->
  <aside class="editor" id="editor">
    <div class="editor-header">
      <h1>内容编辑</h1>
      <p>配置文本、背景图与背景音乐</p>
    </div>
    <div class="editor-body">
      <div class="field">
        <label for="titleInput">标题</label>
        <input type="text" id="titleInput" placeholder="例如：真相揭晓 · 售后说明" value="剧本杀售后" />
      </div>

      <div class="field">
        <label for="contentInput">售后主体文本</label>
        <textarea id="contentInput" placeholder="在此输入剧本杀售后说明、复盘、彩蛋等内容…"></textarea>
      </div>

      <div class="field">
        <label>背景图片</label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="bgInput" accept="image/*" />
          <div class="hint">点击或拖拽上传背景图</div>
          <img class="upload-preview" id="uploadPreview" alt="预览" />
        </div>
      </div>

      <div class="field">
        <label for="bgUrlInput">或：背景图网络链接（大图会自动上传图床）</label>
        <input type="text" id="bgUrlInput" placeholder="图片 URL，生成分享链接时更稳定" />
      </div>

      <div class="field">
        <label>分享设置</label>
        <div class="toggle-row">
          <input type="checkbox" id="noHostMode" />
          <div>
            <div class="toggle-title">强制无图床模式</div>
            <div class="toggle-desc">开启后不会自动上传图片到任何图床，只会把背景图极限压缩塞进链接（可能更糊/甚至放不下）。</div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="youtubeInput">YouTube 背景音乐链接</label>
        <input type="text" id="youtubeInput" placeholder="粘贴 YouTube 视频链接，如 https://youtu.be/xxxxx" />
        <div class="music-status" id="musicStatus"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="applyBtn">应用预览</button>
      </div>
      <div class="btn-row" style="margin-top: 10px;">
        <button class="btn btn-share" id="shareBtn" type="button">🔗 生成分享链接发给朋友</button>
      </div>
      <div class="btn-row" style="margin-top: 10px;">
        <button class="btn" id="saveBtn">保存到本地</button>
        <button class="btn" id="loadBtn">读取本地</button>
      </div>
      <div class="share-box" id="shareBox">
        <label>分享链接</label>
        <input class="share-url" id="shareUrl" type="text" readonly placeholder="点击上方绿色按钮生成链接…" />
        <div class="share-hint" id="shareHint">生成后链接会自动复制，发给朋友打开即可看到你的售后内容</div>
      </div>
    </div>
  </aside>

  <button class="editor-toggle" id="editorToggle" title="展开/收起编辑面板">编辑面板</button>

  <!-- 展示舞台 -->
  <div class="stage-bg" id="stageBg"></div>

  <main class="stage">
    <article class="content-card">
      <h2 class="content-title" id="displayTitle">剧本杀售后</h2>
      <div class="content-divider"></div>
      <div class="content-body" id="displayContent"></div>
    </article>
  </main>

  <!-- 音乐控制 -->
  <div class="music-control" id="musicControl">
    <button id="playPauseBtn" title="播放/暂停">▶</button>
    <span id="musicLabel">背景音乐</span>
  </div>

  <div id="yt-player"></div>

  <script>
    const STORAGE_KEY = "jubensha-aftersale-v1";
    const MAX_URL_LENGTH = 12000;
    const ONLINE_SHARE_URL = "https://zhaohe33.github.io/jubensha-aftersale/";

    const els = {
      editor: document.getElementById("editor"),
      editorToggle: document.getElementById("editorToggle"),
      autoplayHint: document.getElementById("autoplayHint"),
      titleInput: document.getElementById("titleInput"),
      contentInput: document.getElementById("contentInput"),
      bgInput: document.getElementById("bgInput"),
      bgUrlInput: document.getElementById("bgUrlInput"),
      noHostMode: document.getElementById("noHostMode"),
      uploadZone: document.getElementById("uploadZone"),
      uploadPreview: document.getElementById("uploadPreview"),
      youtubeInput: document.getElementById("youtubeInput"),
      musicStatus: document.getElementById("musicStatus"),
      applyBtn: document.getElementById("applyBtn"),
      shareBtn: document.getElementById("shareBtn"),
      shareModal: document.getElementById("shareModal"),
      shareUrlModal: document.getElementById("shareUrlModal"),
      copyShareModal: document.getElementById("copyShareModal"),
      nativeShareBtn: document.getElementById("nativeShareBtn"),
      closeShareModal: document.getElementById("closeShareModal"),
      shareModalHint: document.getElementById("shareModalHint"),
      qrImage: document.getElementById("qrImage"),
      shareBox: document.getElementById("shareBox"),
      shareUrl: document.getElementById("shareUrl"),
      shareHint: document.getElementById("shareHint"),
      saveBtn: document.getElementById("saveBtn"),
      loadBtn: document.getElementById("loadBtn"),
      stageBg: document.getElementById("stageBg"),
      displayTitle: document.getElementById("displayTitle"),
      displayContent: document.getElementById("displayContent"),
      musicControl: document.getElementById("musicControl"),
      playPauseBtn: document.getElementById("playPauseBtn"),
      musicLabel: document.getElementById("musicLabel"),
    };

    let bgImageData = "";
    let ytPlayer = null;
    let isPlaying = false;
    let pendingAutoplay = false;
    let currentVideoId = "";
    let isViewMode = false;
    let autoplayRetryBound = false;
    let lastShareUrl = "";
    let playerReady = false;
    let forceNoHost = false;

    function loadShareSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY + ":shareSettings");
        if (!raw) return;
        const obj = JSON.parse(raw);
        forceNoHost = !!obj.forceNoHost;
        if (els.noHostMode) els.noHostMode.checked = forceNoHost;
      } catch {
        /* ignore */
      }
    }

    function saveShareSettings() {
      try {
        localStorage.setItem(
          STORAGE_KEY + ":shareSettings",
          JSON.stringify({ forceNoHost })
        );
      } catch {
        /* ignore */
      }
    }

    function getYouTubeOrigin() {
      if (location.protocol === "file:" || !location.origin || location.origin === "null") {
        return "https://zhaohe33.github.io";
      }
      return location.origin;
    }

    // ===== YouTube API =====
    function loadYouTubeAPI() {
      if (window.YT) return Promise.resolve();
      return new Promise((resolve) => {
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScript = document.getElementsByTagName("script")[0];
        firstScript.parentNode.insertBefore(tag, firstScript);
        window.onYouTubeIframeAPIReady = () => resolve();
      });
    }

    function extractVideoId(url) {
      if (!url) return "";
      const trimmed = url.trim();
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/watch\?.*v=([a-zA-Z0-9_-]{11})/,
        /^([a-zA-Z0-9_-]{11})$/,
      ];
      for (const p of patterns) {
        const m = trimmed.match(p);
        if (m) return m[1];
      }
      return "";
    }

    function unmutePlayer(player) {
      if (!player || !player.unMute) return;
      try {
        player.unMute();
        player.setVolume(100);
      } catch {
        /* ignore */
      }
    }

    async function initPlayer(videoId) {
      if (!videoId) {
        destroyPlayer();
        return;
      }

      await loadYouTubeAPI();

      if (ytPlayer && currentVideoId === videoId && playerReady) {
        if (pendingAutoplay && ytPlayer.playVideo) {
          ytPlayer.playVideo();
          setTimeout(() => unmutePlayer(ytPlayer), 600);
          pendingAutoplay = false;
        }
        updateMusicUI();
        return;
      }

      destroyPlayer();
      currentVideoId = videoId;
      playerReady = false;

      const shouldAutoplay = pendingAutoplay;

      ytPlayer = new YT.Player("yt-player", {
        height: "200",
        width: "300",
        videoId,
        playerVars: {
          autoplay: shouldAutoplay ? 1 : 0,
          mute: shouldAutoplay ? 1 : 0,
          loop: 1,
          playlist: videoId,
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          rel: 0,
          playsinline: 1,
          enablejsapi: 1,
          origin: getYouTubeOrigin(),
        },
        events: {
          onReady: (e) => {
            playerReady = true;
            if (shouldAutoplay) {
              e.target.playVideo();
              setTimeout(() => {
                unmutePlayer(e.target);
                if (!isPlaying) showAutoplayHintIfNeeded();
              }, 800);
              pendingAutoplay = false;
            }
            updateMusicUI();
          },
          onStateChange: (e) => {
            isPlaying = e.data === YT.PlayerState.PLAYING;
            if (isPlaying) hideAutoplayHint();
            updateMusicUI();
          },
          onError: () => {
            if (!isViewMode) {
              els.musicStatus.textContent = "音乐加载失败，请检查 YouTube 链接或网络";
            }
            showAutoplayHintIfNeeded();
          },
        },
      });
    }

    function destroyPlayer() {
      if (ytPlayer && ytPlayer.destroy) {
        ytPlayer.destroy();
      }
      ytPlayer = null;
      currentVideoId = "";
      playerReady = false;
      isPlaying = false;
      updateMusicUI();
    }

    function updateMusicUI() {
      const vid = extractVideoId(els.youtubeInput.value);
      if (!vid) {
        els.musicControl.classList.remove("visible");
        els.musicStatus.textContent = "";
        els.musicStatus.classList.remove("playing");
        return;
      }

      els.musicControl.classList.add("visible");
      els.playPauseBtn.textContent = isPlaying ? "⏸" : "▶";
      els.musicStatus.textContent = isPlaying ? "♪ 正在播放背景音乐" : "已加载，点击播放";
      els.musicStatus.classList.toggle("playing", isPlaying);
    }

    function togglePlay() {
      if (!ytPlayer || !ytPlayer.playVideo) return;
      if (isPlaying) {
        ytPlayer.pauseVideo();
      } else {
        ytPlayer.playVideo();
      }
      hideAutoplayHint();
    }

    function startMusicAutoplay() {
      pendingAutoplay = true;
      const videoId = extractVideoId(els.youtubeInput.value);
      if (!videoId) return;

      if (ytPlayer && playerReady && ytPlayer.playVideo) {
        ytPlayer.playVideo();
        setTimeout(() => unmutePlayer(ytPlayer), 600);
        pendingAutoplay = false;
        hideAutoplayHint();
        return;
      }

      initPlayer(videoId);
    }

    function hideAutoplayHint() {
      els.autoplayHint.classList.remove("visible");
    }

    function showAutoplayHintIfNeeded() {
      const videoId = extractVideoId(els.youtubeInput.value);
      if (!videoId || isPlaying) return;
      els.autoplayHint.classList.add("visible");
      if (!autoplayRetryBound) {
        autoplayRetryBound = true;
        const retry = () => {
          startMusicAutoplay();
          hideAutoplayHint();
        };
        els.autoplayHint.addEventListener("click", retry);
        document.addEventListener("click", retry, { once: true });
        document.addEventListener("touchstart", retry, { once: true });
      }
    }

    function getBackgroundSource() {
      const url = els.bgUrlInput.value.trim();
      if (url) return url;
      return bgImageData || "";
    }

    function buildPayload() {
      const bgUrl = els.bgUrlInput.value.trim();
      const payload = {
        y: els.youtubeInput.value.trim(),
        t: els.titleInput.value.trim() || "剧本杀售后",
        c: els.contentInput.value,
      };
      if (bgUrl) {
        payload.u = bgUrl;
      } else if (bgImageData) {
        payload.i = bgImageData;
      }
      return payload;
    }

    function encodeShareData(payload) {
      const json = JSON.stringify(payload);
      // Base64URL 比 encodeURIComponent(base64) 更短，能明显降低链接长度
      return btoa(unescape(encodeURIComponent(json)))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=+$/g, "");
    }

    function decodeShareData(encoded) {
      try {
        const normalized = encoded.replace(/-/g, "+").replace(/_/g, "/");
        const pad = normalized.length % 4;
        const withPadding = normalized + (pad ? "=".repeat(4 - pad) : "");
        const json = decodeURIComponent(escape(atob(withPadding)));
        return JSON.parse(json);
      } catch {
        return null;
      }
    }

    function getShareBaseUrl() {
      if (
        location.protocol === "file:" ||
        location.hostname === "localhost" ||
        location.hostname === "127.0.0.1"
      ) {
        return ONLINE_SHARE_URL;
      }
      const base = `${location.origin}${location.pathname}`;
      return base.endsWith("/") ? base : base + "/";
    }

    function buildShareUrl(encoded) {
      return `${getShareBaseUrl()}?s=${encoded}`;
    }

    function getShareUrlLength(payload) {
      return buildShareUrl(encodeShareData(payload)).length;
    }

    function compressImage(dataUrl, maxWidth, quality) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width;
          let h = img.height;
          if (w > maxWidth) {
            h = Math.round((h * maxWidth) / w);
            w = maxWidth;
          }
          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.onerror = () => reject(new Error("图片读取失败"));
        img.src = dataUrl;
      });
    }

    async function dataUrlToBlob(dataUrl) {
      return (await fetch(dataUrl)).blob();
    }

    async function uploadToCatbox(blob) {
      const formData = new FormData();
      formData.append("reqtype", "fileupload");
      formData.append("fileToUpload", blob, "background.jpg");
      const res = await fetch("https://catbox.moe/user/api.php", {
        method: "POST",
        body: formData,
      });
      const text = (await res.text()).trim();
      if (text.startsWith("https://")) return text;
      throw new Error("catbox failed");
    }

    async function uploadToLitterbox(blob) {
      const formData = new FormData();
      formData.append("reqtype", "fileupload");
      formData.append("time", "72h");
      formData.append("fileToUpload", blob, "background.jpg");
      const res = await fetch("https://litterbox.catbox.moe/resources/internals/upload.php", {
        method: "POST",
        body: formData,
      });
      const text = (await res.text()).trim();
      if (text.startsWith("https://")) return text;
      throw new Error("litterbox failed");
    }

    async function uploadTo0x0(blob) {
      const formData = new FormData();
      formData.append("file", blob, "background.jpg");
      const res = await fetch("https://0x0.st", {
        method: "POST",
        body: formData,
      });
      const text = (await res.text()).trim();
      if (text.startsWith("http")) return text;
      throw new Error("0x0 failed");
    }

    async function uploadImageToTelegraph(blob) {
      const formData = new FormData();
      formData.append("file", blob, "background.jpg");
      const res = await fetch("https://telegra.ph/upload", {
        method: "POST",
        body: formData,
      });
      const json = await res.json();
      if (Array.isArray(json) && json[0]?.src) {
        return "https://telegra.ph" + json[0].src;
      }
      throw new Error("telegra failed");
    }

    async function uploadImageWithFallback(dataUrl, onProgress) {
      const compressed = await compressImage(dataUrl, 1600, 0.82);
      const blob = await dataUrlToBlob(compressed);
      const uploaders = [
        { name: "图床 A", fn: () => uploadToCatbox(blob) },
        { name: "图床 B", fn: () => uploadToLitterbox(blob) },
        { name: "图床 C", fn: () => uploadTo0x0(blob) },
        { name: "图床 D", fn: () => uploadImageToTelegraph(blob) },
      ];

      for (const uploader of uploaders) {
        try {
          if (onProgress) onProgress(`正在上传到${uploader.name}…`);
          const url = await uploader.fn();
          return url;
        } catch {
          /* try next */
        }
      }
      throw new Error("自动上传失败，请手动填写「背景图网络链接」");
    }

    async function preparePayloadForShare(payload, onProgress) {
      if (!payload.i || payload.u) return { payload, note: "" };

      if (getShareUrlLength(payload) <= MAX_URL_LENGTH) {
        return { payload, note: "" };
      }

      const tryUpload = async (note) => {
        if (forceNoHost) {
          throw new Error("已开启强制无图床模式");
        }
        const imageUrl = await uploadImageWithFallback(payload.i, onProgress);
        els.bgUrlInput.value = imageUrl;
        bgImageData = "";
        els.uploadPreview.classList.remove("visible");
        const uploadedPayload = { ...payload };
        delete uploadedPayload.i;
        uploadedPayload.u = imageUrl;
        return { payload: uploadedPayload, note };
      };

      // 大图优先上传图床，不塞进 URL（无图床模式除外）
      if (!forceNoHost && payload.i.length > 20000) {
        try {
          return await tryUpload("背景图已自动上传到图床");
        } catch {
          /* 继续尝试压缩 */
        }
      }

      const levels = [
        [1280, 0.75],
        [1024, 0.65],
        [800, 0.55],
        [640, 0.45],
        [480, 0.35],
        [360, 0.28],
        [280, 0.22],
        [200, 0.18],
        [160, 0.14],
        [120, 0.12],
        [96, 0.1],
      ];

      if (onProgress) onProgress("正在压缩背景图…");
      for (const [maxW, quality] of levels) {
        const compressed = await compressImage(payload.i, maxW, quality);
        const testPayload = { ...payload, i: compressed };
        if (getShareUrlLength(testPayload) <= MAX_URL_LENGTH) {
          return {
            payload: testPayload,
            note: "背景图已自动压缩",
          };
        }
      }

      // 先尝试极限缩略图塞进链接，失败再退化为上传
      try {
        const tiny = await compressImage(payload.i, 80, 0.08);
        const tinyPayload = { ...payload, i: tiny };
        if (getShareUrlLength(tinyPayload) <= MAX_URL_LENGTH) {
          return {
            payload: tinyPayload,
            note: "背景图已极限压缩（缩略图）",
          };
        }
      } catch {
        /* ignore */
      }

      try {
        return await tryUpload("背景图已自动上传到图床");
      } catch (err) {
        const withoutImage = { ...payload };
        delete withoutImage.i;
        return {
          payload: withoutImage,
          failed: true,
          note:
            forceNoHost
              ? "无图床模式下背景图仍过大，已生成不含背景图的链接。建议填写「背景图网络链接」或换小图。"
              : (err.message || "背景图上传失败，已生成不含背景图的链接"),
        };
      }
    }

    function setShareLoading(loading, text) {
      els.shareBtn.disabled = loading;
      els.shareBtn.textContent = loading
        ? (text || "正在处理背景图…")
        : "🔗 生成分享链接发给朋友";
    }

    function openShareModal(url) {
      lastShareUrl = url;
      els.shareUrl.value = url;
      els.shareUrlModal.value = url;
      els.shareHint.textContent = "链接已生成！";
      els.shareModalHint.textContent = "链接已复制到剪贴板，直接发给朋友即可。";
      els.qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}`;
      els.shareModal.classList.add("open");
      els.shareUrlModal.focus();
      els.shareUrlModal.select();
    }

    function closeShareModal() {
      els.shareModal.classList.remove("open");
    }

    function generateShareLink() {
      return (async () => {
      try {
        applyPreview(true);

        let payload = buildPayload();
        if (!payload.c && !payload.t) {
          alert("请先填写标题或售后内容");
          return "";
        }

        let shareNote = "";
        if (payload.i && !payload.u) {
          setShareLoading(true, "正在处理背景图…");
          const prepared = await preparePayloadForShare(payload, (msg) => {
            setShareLoading(true, msg);
            els.shareHint.textContent = msg;
          });
          payload = prepared.payload;
          shareNote = prepared.note;
          setShareLoading(false);

          if (prepared.failed) {
            const retry = confirm(
              shareNote + "\n\n是否仍要生成不含背景图的链接？\n点击「取消」可先手动填写背景图网络链接。"
            );
            if (!retry) return "";
          } else if (payload.u) {
            applyPreview(true);
          }
        }

        const encoded = encodeShareData(payload);
        const url = buildShareUrl(encoded);
        if (url.length > MAX_URL_LENGTH) {
          alert("内容仍然过长，请缩短文本后再试");
          return "";
        }

        if (location.protocol !== "file:") {
          history.replaceState(null, "", `?s=${encoded}`);
        }

        openShareModal(url);
        await copyText(url, els.shareHint);
        const msg = shareNote
          ? `✓ 链接已复制！${shareNote}`
          : "✓ 链接已复制！发给朋友打开即可观看";
        els.shareHint.textContent = msg;
        els.shareModalHint.textContent = msg;
        return url;
      } catch (err) {
        setShareLoading(false);
        alert("生成分享链接失败：" + err.message);
        return "";
      }
      })();
    }

    async function copyText(text, hintEl) {
      if (!text) return false;
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      if (hintEl) hintEl.textContent = "已复制到剪贴板！";
      return true;
    }

    async function copyShareLink() {
      const url = lastShareUrl || els.shareUrl.value || els.shareUrlModal.value;
      if (!url) {
        generateShareLink();
        return;
      }
      await copyText(url, els.shareHint);
      els.shareModalHint.textContent = "已复制到剪贴板！";
    }

    async function nativeShare() {
      const url = lastShareUrl || els.shareUrlModal.value;
      if (!url) {
        generateShareLink();
        return;
      }
      const title = els.titleInput.value.trim() || "剧本杀售后";
      if (navigator.share) {
        try {
          await navigator.share({ title, text: title, url });
          els.shareModalHint.textContent = "已唤起分享";
          return;
        } catch {
          /* 用户取消 */
        }
      }
      await copyText(url, els.shareModalHint);
    }

    function applyPayloadToUI(data) {
      els.titleInput.value = data.t || "";
      els.contentInput.value = data.c || "";
      els.youtubeInput.value = data.y || "";
      els.bgUrlInput.value = data.u || "";
      bgImageData = data.i || "";
      if (bgImageData) {
        els.uploadPreview.src = bgImageData;
        els.uploadPreview.classList.add("visible");
      } else {
        els.uploadPreview.classList.remove("visible");
        els.uploadPreview.removeAttribute("src");
      }
    }

    function enterViewMode() {
      isViewMode = true;
      document.body.classList.add("view-mode");
      document.title = els.titleInput.value.trim() || "剧本杀售后";
    }

    function loadFromShareParam() {
      const params = new URLSearchParams(location.search);
      let encoded = params.get("s");

      if (!encoded && location.hash.startsWith("#s=")) {
        encoded = location.hash.slice(3);
      }

      if (!encoded) return false;

      const data = decodeShareData(encoded);
      if (!data) {
        alert("分享链接无效或已损坏，请重新生成");
        return false;
      }

      applyPayloadToUI(data);
      enterViewMode();
      applyPreview(true);
      return true;
    }

    // ===== 应用内容 =====
    function applyPreview(autoplay = false) {
      els.displayTitle.textContent = els.titleInput.value.trim() || "剧本杀售后";
      els.displayContent.textContent = els.contentInput.value;

      const bg = getBackgroundSource();
      if (bg) {
        els.stageBg.style.backgroundImage = `url(${bg})`;
        els.stageBg.classList.add("has-image");
      } else {
        els.stageBg.style.backgroundImage = "";
        els.stageBg.classList.remove("has-image");
      }

      const videoId = extractVideoId(els.youtubeInput.value);
      if (videoId) {
        if (autoplay) pendingAutoplay = true;
        initPlayer(videoId);
      } else {
        destroyPlayer();
        if (!isViewMode) {
          els.musicStatus.textContent = els.youtubeInput.value.trim()
            ? "未识别有效的 YouTube 链接"
            : "";
        }
      }

      if (autoplay && videoId) {
        setTimeout(() => {
          if (!isPlaying) showAutoplayHintIfNeeded();
        }, 2500);
      }
    }

    // ===== 背景图上传 =====
    function handleImageFile(file) {
      if (!file || !file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        bgImageData = e.target.result;
        els.uploadPreview.src = bgImageData;
        els.uploadPreview.classList.add("visible");
      };
      reader.readAsDataURL(file);
    }

    els.bgInput.addEventListener("change", (e) => {
      handleImageFile(e.target.files[0]);
    });

    els.uploadZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      els.uploadZone.style.borderColor = "var(--gold)";
    });

    els.uploadZone.addEventListener("dragleave", () => {
      els.uploadZone.style.borderColor = "";
    });

    els.uploadZone.addEventListener("drop", (e) => {
      e.preventDefault();
      els.uploadZone.style.borderColor = "";
      handleImageFile(e.dataTransfer.files[0]);
    });

    // ===== 本地存储 =====
    function saveToLocal() {
      const data = {
        title: els.titleInput.value,
        content: els.contentInput.value,
        youtube: els.youtubeInput.value,
        bgUrl: els.bgUrlInput.value,
        bgImage: bgImageData,
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        alert("已保存到浏览器本地存储");
      } catch {
        alert("保存失败：图片可能过大，请尝试压缩背景图");
      }
    }

    function loadFromLocal() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        alert("暂无已保存的内容");
        return;
      }
      try {
        const data = JSON.parse(raw);
        els.titleInput.value = data.title || "";
        els.contentInput.value = data.content || "";
        els.youtubeInput.value = data.youtube || "";
        els.bgUrlInput.value = data.bgUrl || "";
        bgImageData = data.bgImage || "";
        if (bgImageData) {
          els.uploadPreview.src = bgImageData;
          els.uploadPreview.classList.add("visible");
        }
        applyPreview(true);
      } catch {
        alert("读取失败");
      }
    }

    // ===== 事件绑定 =====
    els.applyBtn.addEventListener("click", () => applyPreview(true));
    els.shareBtn.addEventListener("click", () => generateShareLink());
    els.copyShareModal.addEventListener("click", copyShareLink);
    els.nativeShareBtn.addEventListener("click", nativeShare);
    els.closeShareModal.addEventListener("click", closeShareModal);
    els.shareModal.addEventListener("click", (e) => {
      if (e.target === els.shareModal) closeShareModal();
    });
    els.saveBtn.addEventListener("click", saveToLocal);
    els.loadBtn.addEventListener("click", loadFromLocal);
    els.playPauseBtn.addEventListener("click", togglePlay);

    els.editorToggle.addEventListener("click", () => {
      els.editor.classList.toggle("collapsed");
      document.body.classList.toggle("editor-collapsed", els.editor.classList.contains("collapsed"));
    });

    if (els.noHostMode) {
      loadShareSettings();
      els.noHostMode.addEventListener("change", () => {
        forceNoHost = !!els.noHostMode.checked;
        saveShareSettings();
      });
    }

    els.bgUrlInput.addEventListener("input", () => {
      if (els.bgUrlInput.value.trim()) applyPreview(false);
    });

    els.youtubeInput.addEventListener("input", () => {
      const vid = extractVideoId(els.youtubeInput.value);
      if (vid) updateMusicUI();
    });

    els.youtubeInput.addEventListener("change", () => {
      if (extractVideoId(els.youtubeInput.value)) {
        applyPreview(true);
      }
    });

    els.youtubeInput.addEventListener("paste", () => {
      setTimeout(() => {
        if (extractVideoId(els.youtubeInput.value)) applyPreview(true);
      }, 100);
    });

    // 实时预览文本（可选，轻量防抖）
    let debounceTimer;
    els.titleInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        els.displayTitle.textContent = els.titleInput.value.trim() || "剧本杀售后";
      }, 300);
    });

    els.contentInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        els.displayContent.textContent = els.contentInput.value;
      }, 300);
    });

    // 分享链接打开时自动加载并播放
    if (loadFromShareParam()) {
      setTimeout(() => startMusicAutoplay(), 500);
    }
  </script>
</body>
</html>
